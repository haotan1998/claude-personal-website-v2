<section class="section about" id="about">
    <div class="container">
        <div class="section__header">
            <span class="section__number">01</span>
            <h2 class="section__title">About</h2>
        </div>
        <div class="about__grid">
            <div class="about__photo-col">
                <div class="about__photo-frame">
                    <img src="{{ .Site.Params.profileImage }}" alt="{{ .Site.Params.author }}" class="about__photo"
                        loading="lazy">
                </div>
            </div>
            <div class="about__text-col">
                <p class="about__lead">{{ .Site.Params.aboutText }}</p>
                <div class="about__details">
                    <div class="about__detail">
                        <span class="about__detail-label">Supervisors</span>
                        <span class="about__detail-value">
                            <a href="https://business.leeds.ac.uk/faculty/staff/1025/dr-nabi-omidvar" target="_blank"
                                rel="noopener">Dr. Nabi Omidvar</a> &amp;
                            <a href="https://eps.leeds.ac.uk/computing/staff/301/professor-netta-cohen" target="_blank"
                                rel="noopener">Prof. Netta Cohen</a>
                        </span>
                    </div>
                    <div class="about__detail">
                        <span class="about__detail-label">Thesis</span>
                        <span class="about__detail-value">Fusion Strategies for Cascading, Merging, and Multi-Tasking
                            Deep Models</span>
                    </div>
                    <div class="about__detail">
                        <span class="about__detail-label">Interests</span>
                        <span class="about__detail-value">AI Applications · Finance Investment</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
