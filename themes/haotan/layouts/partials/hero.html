<section class="hero" id="hero">
    <div class="hero__bg"></div>
    <div class="hero__content">
        <p class="hero__greeting">Hello, I'm</p>
        <h1 class="hero__name">
            {{ .Site.Params.author }}
            <span class="hero__chinese">{{ .Site.Params.chineseName }}</span>
        </h1>
        <p class="hero__role">{{ .Site.Params.role }}</p>
        <p class="hero__affiliation">{{ .Site.Params.affiliation }}</p>
        <div class="hero__actions">
            <a href="#about" class="btn btn--primary">About Me</a>
            <a href="#publications" class="btn btn--outline">Publications</a>
            <div class="hero__resume-group">
                <a href="{{ .Site.Params.resumeEN }}" target="_blank" class="btn btn--text">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Resume (EN)
                </a>
                <span class="hero__resume-sep">/</span>
                <a href="{{ .Site.Params.resumeCN }}" target="_blank" class="btn btn--text">
                    简历 (中文)
                </a>
            </div>
        </div>
    </div>
    <div class="hero__scroll">
        <span>scroll</span>
        <div class="hero__scroll-line"></div>
    </div>
</section>
